name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          install-only: true

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Run lint
        run: make lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Run unit tests
        run: make test-unit

  e2e-tests:
    name: E2E (k8s ${{ matrix.k8s-version || 'latest' }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        k8s-version:
          - ''           # latest (kind default)
          - 'v1.32.3'
          - 'v1.30.8'
          - 'v1.28.15'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Setup kind cluster
        run: make test-e2e-setup
        env:
          KIND_NODE_IMAGE: ${{ matrix.k8s-version }}

      - name: Run e2e tests
        run: make test-e2e
        env:
          KIND_NODE_IMAGE: ${{ matrix.k8s-version }}

      - name: Teardown kind cluster
        if: always()
        run: make test-e2e-teardown
