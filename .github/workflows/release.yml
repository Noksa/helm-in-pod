name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Build binaries
        run: make binaries

      - name: Verify binaries exist
        run: |
          count=$(ls generated/*.tar.gz 2>/dev/null | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "No binaries found in generated/"
            exit 1
          fi
          echo "Found $count release archives:"
          ls -lh generated/*.tar.gz

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: generated/*.tar.gz
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') || contains(github.ref, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
